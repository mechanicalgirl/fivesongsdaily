name: Five Songs Daily deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy using Rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avrh --delete --exclude=".github" --exclude="instance/" --exclude="fivesongs/static/musicfiles"  --exclude="fivesongs/static/albumart"
          path: /
          remote_path: /home/mechanic/fivesongsdaily
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Post-deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/mechanic/fivesongsdaily
            python3.11 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
            supervisorctl restart flask

